<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1d9bf0" />
    <meta name="description" content="Manage multiple Bluesky accounts and mass-follow another profile's followers via the AT Protocol." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Bluesky Manager</title>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">B</div>
        <div>
          <h1>Bluesky Manager</h1>
          <p class="muted small">Mass-follow another profile's followers across multiple accounts</p>
        </div>
      </div>
      <button id="add-account" class="btn">+ Add account</button>
    </header>

    <section class="settings-bar">
      <label class="field svc">
        <span>Service</span>
        <input id="set-service" type="text" value="https://bsky.social" spellcheck="false" />
      </label>
      <label class="field md">
        <span>Source</span>
        <select id="set-type">
          <option value="followers">Target's followers</option>
          <option value="follows">Who target follows</option>
        </select>
      </label>
      <label class="field sm">
        <span>Max to fetch</span>
        <input id="set-max" type="number" value="1000" min="1" max="25000" />
      </label>
      <label class="field sm">
        <span>Delay mode</span>
        <select id="set-delay-mode">
          <option value="fixed">Fixed</option>
          <option value="random">Random range</option>
        </select>
      </label>
      <label class="field sm" id="field-fixed">
        <span>Delay (ms)</span>
        <input id="set-delay" type="number" value="1200" min="0" max="60000" />
      </label>
      <label class="field sm hidden" id="field-min">
        <span>Min (ms)</span>
        <input id="set-delay-min" type="number" value="800" min="0" max="60000" />
      </label>
      <label class="field sm hidden" id="field-max">
        <span>Max (ms)</span>
        <input id="set-delay-max" type="number" value="2500" min="0" max="60000" />
      </label>
      <label class="checkbox">
        <input id="set-skip" type="checkbox" checked />
        <span>Skip already-followed</span>
      </label>
    </section>

    <main id="accounts" class="accounts"></main>

    <footer class="run-bar">
      <div id="global-summary" class="muted small">No accounts running.</div>
      <div class="run-actions">
        <button id="clear-all" class="btn tiny danger">Remove all</button>
        <button id="start-all" class="btn primary">Start all</button>
        <button id="stop-all" class="btn danger hidden">Stop all</button>
      </div>
    </footer>

    <p class="disclaimer">
      Credentials are stored only in this browser (<code>localStorage</code>) on your device. Use a revocable
      <strong>App Password</strong> (Bluesky &rarr; Settings &rarr; App Passwords), not your main password.
    </p>

    <!-- Account card template -->
    <template id="account-template">
      <div class="account-card">
        <div class="ac-inputs">
          <label class="field">
            <span>Handle or email</span>
            <input class="ac-id" type="text" placeholder="account.bsky.social" spellcheck="false" autocapitalize="none" />
          </label>
          <label class="field">
            <span>App password</span>
            <input class="ac-pw" type="password" placeholder="xxxx-xxxx-xxxx-xxxx" />
          </label>
          <label class="field">
            <span>Copy followers from</span>
            <input class="ac-target" type="text" placeholder="target-profile.bsky.social" spellcheck="false" autocapitalize="none" />
          </label>
          <button class="ac-remove" title="Remove account">&times;</button>
        </div>
        <div class="ac-statusbar">
          <span class="ac-dot"></span>
          <span class="ac-state">Idle</span>
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span class="ac-counts muted small"></span>
          <button class="ac-log-toggle btn tiny">Log</button>
        </div>
        <div class="ac-log hidden"></div>
      </div>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
